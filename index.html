<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Enhanced Attendance System</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        body.dark-mode .container {
            background: #2d3561;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #0f3460, #16a085);
        }

        .header-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
        }

        body.dark-mode .tabs {
            background: #1a1f3a;
            border-bottom-color: #0f3460;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
            min-width: 120px;
        }

        body.dark-mode .tab {
            color: #b0b0b0;
        }

        .tab.active {
            background: #3498db;
            color: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab {
                min-width: auto;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        body.dark-mode label {
            color: #e0e0e0;
        }

        .required::after {
            content: " *";
            color: #e74c3c;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
            color: #2c3e50;
        }

        body.dark-mode input, 
        body.dark-mode select, 
        body.dark-mode textarea {
            background: #16213e;
            color: #e0e0e0;
            border-color: #0f3460;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-container input {
            flex: 1;
            min-width: 200px;
        }

        .filter-btn {
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .filter-btn:hover {
            background: #2980b9;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: #3498db;
            color: white;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
        }

        .file-input-label:hover {
            background: #2980b9;
        }

        .photo-preview, .id-preview {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 3px solid #e9ecef;
            margin-top: 10px;
            object-fit: cover;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #7f8c8d;
        }

        .employee-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .employee-card {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: white;
        }

        body.dark-mode .employee-card {
            background: #16213e;
            border-color: #0f3460;
        }

        .employee-card:hover {
            border-color: #3498db;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        .employee-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
            margin-bottom: 10px;
        }

        .employee-id {
            background: #3498db;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .id-proofs {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }

        body.dark-mode .id-proofs {
            background: #0f3460;
            color: #e0e0e0;
        }

        .attendance-section {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            margin: 20px 0;
        }

        body.dark-mode .attendance-section {
            background: linear-gradient(135deg, #16213e, #0f3460);
        }

        .geo-status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .geo-status.geo-ok {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .geo-status.geo-fail {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .geo-status.checking {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }

        .employee-profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        body.dark-mode table {
            color: #e0e0e0;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        body.dark-mode th,
        body.dark-mode td {
            border-bottom-color: #0f3460;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        body.dark-mode th {
            background: #0f3460;
            color: #e0e0e0;
        }

        .login-form {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        body.dark-mode .login-form {
            background: #2d3561;
            color: #e0e0e0;
        }

        .hidden {
            display: none !important;
        }

        .alert {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: 500;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .verified {
            background: #d4edda;
            color: #155724;
        }

        .pending {
            background: #fff3cd;
            color: #856404;
        }

        .present {
            background: #d4edda;
            color: #155724;
        }

        .absent {
            background: #f8d7da;
            color: #721c24;
        }

        .qr-container {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin: 20px 0;
        }

        body.dark-mode .qr-container {
            background: #16213e;
        }

        .qr-container canvas {
            margin: 20px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .copy-link {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .copy-link:hover {
            background: #2980b9;
        }

        .export-btn {
            margin: 20px 0;
        }

        .session-timer {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 1000;
        }

        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
        }

        h1, h2, h3 {
            color: #2c3e50;
        }

        body.dark-mode h1,
        body.dark-mode h2,
        body.dark-mode h3 {
            color: #e0e0e0;
        }

        p {
            color: #555;
        }

        body.dark-mode p {
            color: #b0b0b0;
        }
    </style>
</head>
<body>
    <!-- Session Timer -->
    <div id="sessionTimer" class="session-timer hidden"></div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-form">
        <h2>🔐 HRMS Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="btn btn-primary" onclick="login()" style="width: 100%;">Login</button>
        <p style="margin-top: 20px; font-size: 12px; text-align: center;">
            <strong>Demo Credentials:</strong><br>
            Admin: admin / admin123<br>
            Employee: emp001 / 123456
        </p>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="container hidden">
        <div class="header">
            <h1>🏢 HRMS - Enhanced Attendance System</h1>
            <p id="userInfo"></p>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
                <button class="btn btn-danger" onclick="logout()" style="margin: 0;">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('admin')">👥 Admin Panel</button>
            <button class="tab" onclick="showTab('attendance')">📍 My Attendance</button>
            <button class="tab" onclick="showTab('reports')">📊 Reports</button>
        </div>

        <!-- Admin Panel -->
        <div id="adminTab" class="tab-content active">
            <h2>Employee Management</h2>
            
            <!-- Search and Filter -->
            <div class="search-container">
                <input type="text" id="employeeSearch" placeholder="🔍 Search by name or ID..." onkeyup="filterEmployees()">
                <select id="departmentFilter" onchange="filterEmployees()">
                    <option value="">All Departments</option>
                    <option>IT</option>
                    <option>HR</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                    <option>Sales</option>
                </select>
                <button class="filter-btn" onclick="toggleAddForm()">➕ Add New Employee</button>
                <button class="filter-btn btn-secondary" onclick="exportEmployeeData()">📥 Export Data</button>
            </div>

            <!-- Add Employee Form (Collapsible) -->
            <div id="addEmployeeForm" class="hidden" style="background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <h3>Add New Employee</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="required">Employee ID</label>
                        <input type="text" id="empId" placeholder="EMP001" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label class="required">Employee Name</label>
                        <input type="text" id="empName" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="required">Department</label>
                        <select id="department">
                            <option value="">Select Department</option>
                            <option>IT</option>
                            <option>HR</option>
                            <option>Finance</option>
                            <option>Marketing</option>
                            <option>Sales</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="required">Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                    <div class="form-group">
                        <label class="required">Phone</label>
                        <input type="tel" id="phone" placeholder="9876543210">
                    </div>
                    <div class="form-group">
                        <label class="required">Email</label>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group full-width">
                        <label class="required">Address</label>
                        <textarea id="address" rows="3" placeholder="Full address"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="required">Employee Photo</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="empPhoto" accept="image/*" onchange="previewImage(this, 'photoPreview')">
                            <label for="empPhoto" class="file-input-label">📷 Choose Photo</label>
                        </div>
                        <img id="photoPreview" class="photo-preview hidden" alt="Photo Preview">
                    </div>
                    <div class="form-group">
                        <label class="required">Aadhar Card</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="aadharCard" accept="image/*,.pdf" onchange="previewImage(this, 'aadharPreview')">
                            <label for="aadharCard" class="file-input-label">🆔 Choose Aadhar</label>
                        </div>
                        <img id="aadharPreview" class="id-preview hidden" alt="Aadhar Preview">
                        <div id="aadharNumber" style="margin-top: 10px;">
                            <label>Aadhar Number</label>
                            <input type="text" id="aadharNum" placeholder="1234 5678 9012" maxlength="14">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="required">PAN Card</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="panCard" accept="image/*,.pdf" onchange="previewImage(this, 'panPreview')">
                            <label for="panCard" class="file-input-label">💳 Choose PAN</label>
                        </div>
                        <img id="panPreview" class="id-preview hidden" alt="PAN Preview">
                        <div id="panNumber" style="margin-top: 10px;">
                            <label>PAN Number</label>
                            <input type="text" id="panNum" placeholder="ABCDE1234F" maxlength="10">
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="addEmployee()" style="font-size: 16px; padding: 12px 30px;">✅ Add Employee</button>
                <button class="btn btn-secondary" onclick="toggleAddForm()" style="font-size: 16px; padding: 12px 30px;">❌ Cancel</button>
            </div>

            <div id="employeeList" class="employee-list"></div>
        </div>

        <!-- Attendance Tab -->
        <div id="attendanceTab" class="tab-content">
            <div class="attendance-section">
                <div class="employee-profile" id="empProfile">
                    <!-- Employee profile will load here -->
                </div>
                <h2>⏰ Clock In / Out</h2>
                <div id="geoStatus" class="geo-status checking">Checking location...</div>
                <div id="attendanceStatus" class="status">Ready to Clock In</div>
                <button id="clockBtn" class="btn btn-success" onclick="clockInOut()" style="font-size: 18px; padding: 15px 40px;">
                    ✋ Clock In
                </button>
                <div id="todayAttendance"></div>

                <!-- QR Code Share -->
                <div class="qr-container">
                    <h3>📱 Share Attendance Link</h3>
                    <canvas id="qrcode"></canvas>
                    <br>
                    <button class="copy-link" onclick="copyAttendanceLink()">🔗 Copy Link</button>
                </div>
            </div>
        </div>

        <!-- Reports Tab -->
        <div id="reportsTab" class="tab-content">
            <h2>📊 Attendance Reports</h2>
            <div style="margin: 20px 0;">
                <button class="btn btn-primary export-btn" onclick="exportReportPDF()">📄 Export as PDF</button>
                <button class="btn btn-primary export-btn" onclick="exportReportCSV()">📊 Export as CSV</button>
            </div>
            <div id="reportsTable"></div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const OFFICE_LOCATION = { lat: 28.6139, lng: 77.2090 }; // Delhi, India
        const GEOFENCE_RADIUS = 100; // 100 meters
        const SESSION_TIMEOUT = 30 * 60 * 1000; // 30 minutes
        let sessionWarningShown = false;

        // ========== GLOBAL STATE ==========
        let users = JSON.parse(localStorage.getItem('users')) || [
            { username: 'admin', password: 'admin123', role: 'admin', name: 'Admin User' },
            { username: 'emp001', password: '123456', role: 'employee', empId: 'EMP001', name: 'John Doe' }
        ];

        let employees = JSON.parse(localStorage.getItem('employees')) || [];
        let attendance = JSON.parse(localStorage.getItem('attendance')) || [];
        let currentUser = null;
        let userLocation = null;
        let lastActivityTime = Date.now();
        let sessionTimer = null;

        // ========== UTILITY FUNCTIONS ==========
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        function toggleAddForm() {
            const form = document.getElementById('addEmployeeForm');
            form.classList.toggle('hidden');
            if (!form.classList.contains('hidden')) {
                form.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetActivityTimer() {
            lastActivityTime = Date.now();
            sessionWarningShown = false;
        }

        function startSessionTimer() {
            if (sessionTimer) clearInterval(sessionTimer);
            
            sessionTimer = setInterval(() => {
                const timeElapsed = Date.now() - lastActivityTime;
                const timeRemaining = SESSION_TIMEOUT - timeElapsed;

                if (timeRemaining <= 0) {
                    logout();
                    showAlert('Session expired. Please login again.', 'error');
                    clearInterval(sessionTimer);
                } else if (timeRemaining <= 5 * 60 * 1000 && !sessionWarningShown) {
                    sessionWarningShown = true;
                    showAlert('⚠️ Your session will expire in 5 minutes due to inactivity.', 'info');
                }

                const minutes = Math.floor(timeRemaining / 60000);
                const seconds = Math.floor((timeRemaining % 60000) / 1000);
                document.getElementById('sessionTimer').textContent = `Session: ${minutes}m ${seconds}s`;
                document.getElementById('sessionTimer').classList.remove('hidden');
            }, 1000);
        }

        // Reset timer on user activity
        document.addEventListener('mousemove', resetActivityTimer);
        document.addEventListener('keypress', resetActivityTimer);
        document.addEventListener('click', resetActivityTimer);

        // ========== IMAGE HANDLING ==========
        
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            const file = input.files[0];

            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showAlert('File size exceeds 5MB limit!', 'error');
                input.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                } catch (error) {

        // ========== VALIDATION ==========
        
        function validateEmployeeData() {
            const requiredFields = {
                'empId': 'Employee ID',
                'empName': 'Employee Name',
                'department': 'Department',
                'dob': 'Date of Birth',
                'phone': 'Phone',
                'email': 'Email',
                'address': 'Address',
                'aadharNum': 'Aadhar Number',
                'panNum': 'PAN Number'
            };

            for (let [fieldId, fieldLabel] of Object.entries(requiredFields)) {
                const field = document.getElementById(fieldId);
                if (!field || !field.value.trim()) {
                    showAlert(`${fieldLabel} is required!`, 'error');
                    if (field) field.focus();
                    return false;
                }
            }

            // Check file uploads
            const photoPreview = document.getElementById('photoPreview');
            const aadharPreview = document.getElementById('aadharPreview');
            const panPreview = document.getElementById('panPreview');

            if (!photoPreview || photoPreview.classList.contains('hidden')) {
                showAlert('Employee photo is required!', 'error');
                return false;
            }
            if (!aadharPreview || aadharPreview.classList.contains('hidden')) {
                showAlert('Aadhar card photo is required!', 'error');
                return false;
            }
            if (!panPreview || panPreview.classList.contains('hidden')) {
                showAlert('PAN card photo is required!', 'error');
                return false;
            }

            // Validate Aadhar format
            const aadhar = document.getElementById('aadharNum').value.replace(/\s/g, '');
            if (!/^\d{12}$/.test(aadhar)) {
                showAlert('Please enter valid 12-digit Aadhar number', 'error');
                return false;
            }

            // Validate PAN format
            const pan = document.getElementById('panNum').value.toUpperCase();
            if (!/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan)) {
                showAlert('Please enter valid PAN number (ABCDE1234F)', 'error');
                return false;
            }

            // Validate email
            const email = document.getElementById('email').value;
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAlert('Please enter valid email address', 'error');
                return false;
            }

            // Check for duplicate Employee ID
            const empId = document.getElementById('empId').value.toUpperCase();
            if (employees.find(emp => emp.id === empId)) {
                showAlert('Employee ID already exists!', 'error');
                return false;
            }

            return true;
        }

        // ========== GEOLOCATION ==========
        
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                updateGeoStatus('Geolocation not supported', 'geo-fail');
                return;
            }

            updateGeoStatus('Checking location...', 'checking');

            navigator.geolocation.getCurrentPosition(
                position => {
                    try {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };
                        checkGeofence();
                    } catch (error) {
                        updateGeoStatus('Error processing location', 'geo-fail');
                    }
                },
                error => {
                    updateGeoStatus('Location access denied', 'geo-fail');
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        }

        function updateGeoStatus(message, className) {
            const statusEl = document.getElementById('geoStatus');
            if (statusEl) {
                statusEl.innerHTML = message;
                statusEl.className = `geo-status ${className}`;
            }
        }

        function checkGeofence() {
            try {
                if (!userLocation) return;

                const distance = getDistance(userLocation, OFFICE_LOCATION);
                const isWithinGeofence = distance <= GEOFENCE_RADIUS;

                if (isWithinGeofence) {
                    updateGeoStatus(`✅ Within Office (<strong>${distance.toFixed(0)}m</strong>)`, 'geo-ok');
                } else {
                    updateGeoStatus(`❌ Outside Office (<strong>${distance.toFixed(0)}m</strong>)`, 'geo-fail');
                }
            } catch (error) {
                updateGeoStatus('Error checking geofence', 'geo-fail');
            }
        }

        function getDistance(pos1, pos2) {
            try {
                const R = 6371e3;
                const φ1 = pos1.lat * Math.PI/180;
                const φ2 = pos2.lat * Math.PI/180;
                const Δφ = (pos2.lat-pos1.lat) * Math.PI/180;
                const Δλ = (pos2.lng-pos1.lng) * Math.PI/180;

                const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                        Math.cos(φ1) * Math.cos(φ2) *
                        Math.sin(Δλ/2) * Math.sin(Δλ/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

                return R * c;
            } catch (error) {
                console.error('Distance calculation error:', error);
                return Infinity;
            }
        }

        // ========== ATTENDANCE TRACKING ==========
        
        function loadTodayAttendance() {
            try {
                if (!currentUser.empId) return;
                
                const today = new Date().toDateString();
                const todayRecords = attendance.filter(record => 
                    record.empId === currentUser.empId && 
                    new Date(record.timestamp).toDateString() === today
                );

                const inRecord = todayRecords.find(r => r.type === 'in');
                const outRecord = todayRecords.find(r => r.type === 'out');

                const statusEl = document.getElementById('attendanceStatus');
                const todayEl = document.getElementById('todayAttendance');
                const clockBtn = document.getElementById('clockBtn');

                if (inRecord && outRecord) {
                    statusEl.innerHTML = `<strong>✅ Present</strong> - Clocked Out at ${new Date(outRecord.timestamp).toLocaleTimeString()}`;
                    statusEl.className = 'status present';
                    clockBtn.textContent = 'Today\'s Record Complete';
                    clockBtn.disabled = true;
                    todayEl.innerHTML = `
                        <div style="margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px;">
                            <p><strong>Clock In:</strong> ${new Date(inRecord.timestamp).toLocaleTimeString()}</p>
                            <p><strong>Clock Out:</strong> ${new Date(outRecord.timestamp).toLocaleTimeString()}</p>
                            <p><strong>Duration:</strong> ${calculateDuration(inRecord.timestamp, outRecord.timestamp)}</p>
                        </div>
                    `;
                } else if (inRecord) {
                    statusEl.innerHTML = `<strong>🔄 Clocked In</strong> at ${new Date(inRecord.timestamp).toLocaleTimeString()}`;
                    statusEl.className = 'status present';
                    clockBtn.textContent = 'Clock Out';
                    clockBtn.disabled = false;
                    todayEl.innerHTML = `
                        <div style="margin-top: 20px; padding: 15px; background: #fff3e0; border-radius: 8px;">
                            <p><strong>Clock In Time:</strong> ${new Date(inRecord.timestamp).toLocaleTimeString()}</p>
                            <p><strong>Working Duration:</strong> ${calculateDuration(inRecord.timestamp, new Date().toISOString())}</p>
                        </div>
                    `;
                } else {
                    statusEl.textContent = 'Ready to Clock In';
                    statusEl.className = 'status';
                    clockBtn.textContent = 'Clock In';
                    clockBtn.disabled = false;
                    todayEl.innerHTML = '';
                }
            } catch (error) {
                showAlert('Error loading attendance: ' + error.message, 'error');
            }
        }

        function calculateDuration(startTime, endTime) {
            try {
                const start = new Date(startTime);
                const end = new Date(endTime);
                const diffMs = end - start;
                const hours = Math.floor(diffMs / (1000 * 60 * 60));
                const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                return `${hours}h ${minutes}m`;
            } catch (error) {
                return 'N/A';
            }
        }

        function clockInOut() {
            try {
                if (!currentUser.empId) {
                    showAlert('Employee ID not found. Contact admin.', 'error');
                    return;
                }

                if (!userLocation) {
                    showAlert('Please allow location access', 'error');
                    return;
                }

                const distance = getDistance(userLocation, OFFICE_LOCATION);
                if (distance > GEOFENCE_RADIUS) {
                    showAlert(`You must be within ${GEOFENCE_RADIUS}m of office to clock in/out. Current distance: ${distance.toFixed(0)}m`, 'error');
                    return;
                }

                const today = new Date().toDateString();
                const todayRecords = attendance.filter(record => 
                    record.empId === currentUser.empId && 
                    new Date(record.timestamp).toDateString() === today
                );

                const outRecord = todayRecords.find(r => r.type === 'out');
                if (outRecord) {
                    showAlert('You have already clocked out today!', 'info');
                    return;
                }

                const record = {
                    empId: currentUser.empId,
                    empName: currentUser.name,
                    type: todayRecords.length > 0 ? 'out' : 'in',
                    timestamp: new Date().toISOString(),
                    location: userLocation,
                    distance: distance
                };

                attendance.push(record);
                localStorage.setItem('attendance', JSON.stringify(attendance));
                loadTodayAttendance();
                loadReports();
                showAlert(`✅ Successfully clocked ${record.type.toUpperCase()}!`, 'success');
            } catch (error) {
                showAlert('Error during clock in/out: ' + error.message, 'error');
            }
        }

        // ========== REPORTS ==========
        
        function loadReports() {
            try {
                const container = document.getElementById('reportsTable');
                const last7Days = [];
                const now = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(now);
                    date.setDate(now.getDate() - i);
                    last7Days.push(date.toDateString());
                }

                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Employee</th>
                                <th>Photo</th>
                                <th>Clock In</th>
                                <th>Clock Out</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Distance</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                last7Days.forEach(dateStr => {
                    const dayRecords = attendance.filter(record => 
                        new Date(record.timestamp).toDateString() === dateStr
                    );

                    if (dayRecords.length > 0) {
                        const groupedByEmp = {};
                        dayRecords.forEach(record => {
                            if (!groupedByEmp[record.empId]) {
                                groupedByEmp[record.empId] = [];
                            }
                            groupedByEmp[record.empId].push(record);
                        });

                        Object.keys(groupedByEmp).forEach(empId => {
                            const empRecords = groupedByEmp[empId];
                            const emp = employees.find(e => e.id === empId);
                            const inRecord = empRecords.find(r => r.type === 'in');
                            const outRecord = empRecords.find(r => r.type === 'out');
                            
                            const duration = inRecord && outRecord 
                                ? calculateDuration(inRecord.timestamp, outRecord.timestamp)
                                : '-';
                            
                            const status = outRecord 
                                ? '<span style="color:#27ae60; font-weight: bold;">✅ Present</span>'
                                : '<span style="color:#f39c12; font-weight: bold;">🔄 Partial</span>';
                            
                            tableHTML += `
                                <tr>
                                    <td>${dateStr}</td>
                                    <td>${empRecords[0].empName} (${empId})</td>
                                    <td>
                                        ${emp ? `<img src="${emp.photo}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">` : 'N/A'}
                                    </td>
                                    <td>${inRecord ? new Date(inRecord.timestamp).toLocaleTimeString() : '-'}</td>
                                    <td>${outRecord ? new Date(outRecord.timestamp).toLocaleTimeString() : '-'}</td>
                                    <td>${duration}</td>
                                    <td>${status}</td>
                                    <td>${inRecord ? inRecord.distance.toFixed(0) + 'm' : '-'}</td>
                                </tr>
                            `;
                        });
                    }
                });

                tableHTML += '</tbody></table>';
                container.innerHTML = tableHTML;
            } catch (error) {
                showAlert('Error loading reports: ' + error.message, 'error');
            }
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

            try {
                if (currentUser.role === 'admin') {
                    loadEmployees();
                    loadReports();
                }
                loadTodayAttendance();
                loadEmployeeProfile();
            } catch (error) {
                showAlert('Error loading tab data: ' + error.message, 'error');
            }
        }

        function showAlert(message, type = 'info') {
            try {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${type}`;
                alertDiv.innerHTML = message;
                
                const activeContent = document.querySelector('.tab-content.active');
                if (activeContent) {
                    activeContent.insertBefore(alertDiv, activeContent.firstChild);
                } else {
                    document.body.insertBefore(alertDiv, document.body.firstChild);
                }
                
                setTimeout(() => {
                    alertDiv.remove();
                }, 5000);
            } catch (error) {
                console.error('Alert error:', error);
            }
        }

        // ========== AUTO-UPDATE ==========
        
        setInterval(() => {
            if (currentUser && currentUser.empId && document.getElementById('attendanceTab').classList.contains('active')) {
                getCurrentLocation();
                loadTodayAttendance();
            }
        }, 30000);
    </script>
</body>
</html>
